name: Vercel Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
jobs:
    build:
        name: Build docusaurus site
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Install Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '20'
              cache: 'npm'
              cache-dependency-path: package-lock.json

          - name: Install dependencies
            run: npm ci

          - name: Lint the code
            run: npm run lint

          - name: Build the site
            run: npm run build
    deploy:
        needs: build
        name: Deploy to Vercel
        runs-on: ubuntu-latest
        steps:
           - uses: actions/checkout@v4
           - name: Install Vercel CLI
             run: npm install --global vercel@latest

           - name: Pull Vercel Environment Info
             run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

           - name: Build Project Artifacts
             run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

           - name: Deploy Project Artifacts to Vercel
             run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
    
    summary:
        name: Generate Summary
        runs-on: ubuntu-latest
        if: always() # Run this job even if the previous jobs fail
        steps:
            - name: Build status
              run: |
                if [ ${{ needs.build.result }} == 'success' ] && [ ${{ needs.deploy.result }} == 'success' ]; then
                  echo "✅ Build and Deploy succeeded." >> $GITHUB_STEP_SUMMARY
                elif [ ${{ needs.build.result }} == 'failure' ]; then
                  echo "❌ Build failed." >> $GITHUB_STEP_SUMMARY
                elif [ ${{ needs.deploy.result }} == 'failure' ]; then
                  echo "❌ Deploy failed." >> $GITHUB_STEP_SUMMARY
                else
                  echo "⚠️ Build and Deploy status is unknown." >> $GITHUB_STEP_SUMMARY

